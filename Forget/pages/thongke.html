<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống Kê - ForgetMeNot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/thongke.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
    <div class="logo">
        <i class="fas fa-brain"></i>
        <span>ForgetMeNot</span>
    </div>
    <button class="sidebar-toggle" id="sidebarToggle">
        <i class="fas fa-bars"></i>
    </button>
</div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Trang chủ</span>
                </a>
                <a href="khothe.html" class="nav-item">
                    <i class="fas fa-layer-group"></i>
                    <span>Kho thẻ</span>
                </a>
                <a href="ontap.html" class="nav-item">
                    <i class="fas fa-book-open-reader"></i>
                    <span>Ôn tập</span>
                </a>
                <a href="thongke.html" class="nav-item active">
                    <i class="fas fa-chart-line"></i>
                    <span>Thống kê</span>
                </a>
                <a href="congdong.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Cộng đồng</span>
                </a>
                <a href="caidat.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Cài đặt</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Người Dùng</div>
                        <div class="user-email" id="userEmail">user@email.com</div>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Đăng xuất</span>
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <div>
                    <h1>Thống Kê Học Tập</h1>
                    <p>Theo dõi tiến độ và hiệu suất của bạn</p>
                </div>
                <div class="period-selector">
                    <button class="period-btn active" data-period="week">Tuần</button>
                    <button class="period-btn" data-period="month">Tháng</button>
                    <button class="period-btn" data-period="year">Năm</button>
                </div>
            </div>
            
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card orange">
                    <div class="stat-icon"><i class="fas fa-fire"></i></div>
                    <div class="stat-content">
                        <span class="stat-label">Streak</span>
                        <span class="stat-value" id="streakStat">0</span>
                        <span class="stat-unit">ngày</span>
                    </div>
                </div>
                <div class="stat-card blue">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-content">
                        <span class="stat-label">Thẻ đã học</span>
                        <span class="stat-value" id="cardsLearnedStat">0</span>
                        <span class="stat-unit">thẻ</span>
                    </div>
                </div>
                <div class="stat-card green">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-content">
                        <span class="stat-label">Thời gian học</span>
                        <span class="stat-value" id="timeStat">0</span>
                        <span class="stat-unit">phút</span>
                    </div>
                </div>
                <div class="stat-card purple">
                    <div class="stat-icon"><i class="fas fa-trophy"></i></div>
                    <div class="stat-content">
                        <span class="stat-label">Tỷ lệ ghi nhớ</span>
                        <span class="stat-value" id="retentionStat">0%</span>
                        <span class="stat-unit">hiệu quả</span>
                    </div>
                </div>
            </div>
            
            <!-- Charts Row -->
            <div class="charts-row">
                <div class="chart-card">
                    <h3>Hoạt động hàng ngày</h3>
                    <div class="chart-container">
                        <canvas id="dailyChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>Tỷ lệ ghi nhớ</h3>
                    <div class="chart-container">
                        <canvas id="retentionChart"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- Deck Performance -->
            <div class="deck-performance">
                <h3>Hiệu suất các bộ thẻ</h3>
                <div class="deck-list" id="deckPerformanceList">
                    <!-- Dynamic content -->
                </div>
            </div>
        </main>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>
    
    <script src="../js/auth.js"></script>
    <script src="../js/thongke.js"></script>
</body>
</html>
